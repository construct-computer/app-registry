name: Sync Registry to D1

on:
  push:
    branches: [main]
    paths:
      - 'apps/*.json'
      - 'collections/*.json'
      - 'categories.json'
      - 'curated.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Sync apps to D1
        env:
          REGISTRY_SYNC_URL: ${{ secrets.REGISTRY_SYNC_URL }}
          REGISTRY_SYNC_SECRET: ${{ secrets.REGISTRY_SYNC_SECRET }}
        run: deno run --allow-read --allow-write --allow-net --allow-env --allow-run scripts/sync.ts
